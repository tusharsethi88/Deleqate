<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ code }} — {{ title }} | Deleqate</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--cream);}
  .err-box{background:var(--white);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);padding:3rem 2.5rem;text-align:center;max-width:480px;width:100%;}
  .err-code{font-size:5rem;font-weight:800;color:var(--navy);opacity:.12;line-height:1;margin-bottom:.5rem;}
  .err-title{font-size:1.375rem;font-weight:700;color:var(--navy);margin-bottom:.75rem;}
  .err-msg{color:var(--gray-500);font-size:.9375rem;margin-bottom:2rem;}
  .err-actions{display:flex;gap:.75rem;justify-content:center;}
</style>
</head>
<body>
<div class="err-box">
  <div class="err-code">{{ code }}</div>
  <div class="err-title">{{ title }}</div>
  <p class="err-msg">{{ message }}</p>
  <div class="err-actions">
    <a href="/" class="btn btn-primary">← Back to Home</a>
    {% if current_user.is_authenticated %}
    <a href="{{ url_for('login') }}" class="btn btn-outline">Login</a>
    {% endif %}
  </div>
</div>
<script src="{{ url_for('static', filename='js/mobile.js') }}" defer></script>
</body>
</html>
