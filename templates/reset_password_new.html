<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set New Password — Deleqate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--surface-low);}
  .auth-box{background:var(--white);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);padding:2.5rem;width:100%;max-width:420px;margin:1rem;}
  .auth-logo{text-align:center;font-size:1.5rem;font-weight:800;color:var(--navy);margin-bottom:0.25rem;}
  .auth-logo span{color:var(--gold);}
  @media(max-width:480px){
    body{align-items:flex-start;padding-top:2rem;}
    .auth-box{padding:1.5rem 1.125rem !important;margin:.75rem !important;}
  }
  .form-control,input[type=password]{font-size:1rem !important;}
  .strength-bar{height:4px;border-radius:2px;margin-top:0.4rem;transition:width 0.3s,background 0.3s;}
</style>
</head>
<body>
<div class="auth-box">
  <div class="auth-logo">Dele<span>qate</span></div>
  <div style="text-align:center;font-size:2rem;margin:1rem 0;">🔒</div>
  <div style="text-align:center;font-weight:700;font-size:1.1rem;color:var(--navy);margin-bottom:0.4rem;">Set a new password</div>
  <div style="text-align:center;font-size:0.875rem;color:var(--gray-500);margin-bottom:1.75rem;">Must be at least 8 characters.</div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ 'danger' if cat == 'error' else ('success' if cat == 'success' else 'info') }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{ url_for('reset_password_new') }}" id="reset-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label class="form-label">New Password</label>
      <input type="password" name="password" id="pw1" class="form-control" placeholder="Min 8 characters" required minlength="8" maxlength="128" autofocus autocomplete="new-password">
      <div style="background:var(--gray-200);border-radius:2px;height:4px;margin-top:0.5rem;">
        <div id="strength-bar" class="strength-bar" style="width:0%;background:var(--gray-300);"></div>
      </div>
      <div id="strength-label" style="font-size:0.75rem;color:var(--gray-400);margin-top:0.25rem;"></div>
    </div>
    <div class="form-group" style="margin-top:0.75rem;">
      <label class="form-label">Confirm Password</label>
      <input type="password" name="password2" id="pw2" class="form-control" placeholder="Repeat password" required minlength="8" maxlength="128" autocomplete="new-password">
      <div id="match-msg" style="font-size:0.75rem;margin-top:0.25rem;"></div>
    </div>
    <button type="submit" class="btn btn-primary btn-full" style="margin-top:1.25rem;">Update Password →</button>
  </form>
</div>
<script>
const pw1 = document.getElementById('pw1');
const pw2 = document.getElementById('pw2');
const bar = document.getElementById('strength-bar');
const lbl = document.getElementById('strength-label');
const matchMsg = document.getElementById('match-msg');

pw1.addEventListener('input', () => {
  const v = pw1.value;
  let score = 0;
  if (v.length >= 8) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
  const labels = ['Weak','Fair','Good','Strong'];
  bar.style.width = (score * 25) + '%';
  bar.style.background = colors[score-1] || '#e5e7eb';
  lbl.textContent = score > 0 ? labels[score-1] : '';
  lbl.style.color = colors[score-1] || 'var(--gray-400)';
  checkMatch();
});

pw2.addEventListener('input', checkMatch);

function checkMatch() {
  if (!pw2.value) { matchMsg.textContent = ''; return; }
  if (pw1.value === pw2.value) {
    matchMsg.textContent = '✓ Passwords match';
    matchMsg.style.color = '#22c55e';
  } else {
    matchMsg.textContent = '✗ Passwords do not match';
    matchMsg.style.color = '#ef4444';
  }
}

document.getElementById('reset-form').addEventListener('submit', e => {
  if (pw1.value !== pw2.value) {
    e.preventDefault();
    matchMsg.textContent = '✗ Passwords do not match';
    matchMsg.style.color = '#ef4444';
    pw2.focus();
  }
});
</script>
<script src="{{ url_for('static', filename='js/mobile.js') }}" defer></script>
</body>
</html>
