<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deleqate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8fafc;font-family:'Inter',sans-serif;}
  .box{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.08);padding:2.5rem;width:100%;max-width:380px;}
  .logo{display:flex;justify-content:center;margin-bottom:2rem;}
  .logo img, .logo video{height:94px;width:auto;display:block;mix-blend-mode:multiply;}
  
  label{display:block;font-size:0.8rem;font-weight:600;color:#6b7280;margin-bottom:0.3rem;margin-top:1rem;}
  input{width:100%;padding:0.6rem 0.9rem;border:1.5px solid #e5e7eb;border-radius:8px;font-size:1rem;outline:none;transition:border-color 0.15s;}
  input:focus{border-color:#C5A028;}
  .btn{width:100%;margin-top:1.5rem;padding:0.65rem;background:#1b1c1c;color:#fff;border:none;border-radius:8px;font-size:0.9375rem;font-weight:600;cursor:pointer;transition:background 0.2s;}
  .btn:hover{background:#2e2e2e;}
  .alert{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;border-radius:6px;padding:0.6rem 0.9rem;font-size:0.875rem;margin-bottom:1rem;}
  .pw-wrap{position:relative;}
  .pw-wrap input{padding-right:2.5rem!important;width:100%;}
  .pw-eye{position:absolute;right:0.65rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;display:flex;align-items:center;padding:0;line-height:1;}
  .pw-eye:hover{color:#6b7280;}
</style>
</head>
<body>
<div class="box">
  <div class="logo"><video src="{{ url_for('static', filename='img/logo.mp4') }}" autoplay loop muted playsinline></video></div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="text" name="website" style="display:none;" tabindex="-1" autocomplete="off">
    <label>Email</label>
    <input type="email" name="email" required autofocus autocomplete="email" maxlength="254">
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="adl-pw" name="password" required autocomplete="current-password" maxlength="128">
      <button type="button" class="pw-eye" onclick="togglePw('adl-pw',this)" aria-label="Show password" tabindex="-1">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <button type="submit" class="btn">Sign In</button>
  </form>
  <p style="text-align:center;margin-top:1.25rem;font-size:0.8rem;">
    <a href="{{ url_for('forgot_password', role='admin') }}" style="color:#6b7280;text-decoration:underline;">Forgot password?</a>
  </p>
</div>
<script>
function togglePw(id, btn) {
  var inp = document.getElementById(id);
  var showing = inp.type === 'text';
  inp.type = showing ? 'password' : 'text';
  btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
  btn.innerHTML = showing
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
}
</script>
</body>
</html>
