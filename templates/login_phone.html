<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Deleqate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--surface-low);}
  .auth-box{background:var(--white);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);padding:2.5rem;width:100%;max-width:420px;margin:1rem;}
  .auth-logo{text-align:center;font-size:1.5rem;font-weight:800;color:var(--navy);margin-bottom:0.25rem;}
  .auth-logo span{color:var(--gold);}
  .auth-sub{text-align:center;font-size:0.875rem;color:var(--gray-500);margin-bottom:2rem;}
  @media(max-width:480px){
    body{ align-items:flex-start; padding-top:2rem; }
    .auth-box{ padding:1.5rem 1.125rem !important; margin:.75rem !important; }
    .auth-logo{ font-size:1.25rem; }
  }
  .form-control, input[type=email], input[type=password],
  input[type=tel], input[type=text], select, textarea { font-size:1rem !important; }
</style>
</head>
<body>
<div class="auth-box">
  <div class="auth-logo">Dele<span>qate</span></div>
  <div class="auth-sub">Sign in to place your order</div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ 'danger' if cat == 'error' else ('success' if cat == 'success' else 'info') }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{ url_for('login_phone') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="text" name="website" style="display:none;" tabindex="-1" autocomplete="off">
    <div class="form-group">
      <label class="form-label">Email address</label>
      <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus autocomplete="email" maxlength="254">
    </div>
    <div class="form-group" style="margin-top:1rem;">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Your password" required autocomplete="current-password" maxlength="128">
    </div>
    <button type="submit" class="btn btn-primary btn-full" style="margin-top:1.25rem;">Sign In →</button>
  </form>

  <div style="display:flex;align-items:center;gap:0.75rem;margin:1.25rem 0;color:var(--gray-400);font-size:0.8rem;">
    <div style="flex:1;height:1px;background:var(--gray-200);"></div>or<div style="flex:1;height:1px;background:var(--gray-200);"></div>
  </div>

  <p style="text-align:center;font-size:0.875rem;color:var(--gray-500);">
    Don't have an account? <a href="{{ url_for('signup') }}" style="color:var(--navy);font-weight:700;">Sign Up</a>
  </p>
  <p style="text-align:center;margin-top:0.75rem;font-size:0.8125rem;">
    <a href="/" style="color:var(--gray-400);">← Back to Deleqate</a>
  </p>
</div>
<script src="{{ url_for('static', filename='js/mobile.js') }}" defer></script>
</body>
</html>
