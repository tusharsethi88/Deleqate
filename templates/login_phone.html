<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Deleqate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--surface-low);}
  .auth-box{background:var(--white);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);padding:2.5rem;width:100%;max-width:420px;margin:1rem;}
  .auth-logo{display:flex;justify-content:center;margin-bottom:0.5rem;}
  .auth-logo img, .auth-logo video{height:94px;width:auto;display:block;mix-blend-mode:multiply;}
  
  .auth-sub{text-align:center;font-size:0.875rem;color:var(--gray-500);margin-bottom:2rem;}
  @media(max-width:480px){
    body{ align-items:flex-start; padding-top:2rem; }
    .auth-box{ padding:1.5rem 1.125rem !important; margin:.75rem !important; }
    .auth-logo img, .auth-logo video{height:78px;}
  }
  .form-control, input[type=email], input[type=password],
  input[type=tel], input[type=text], select, textarea { font-size:1rem !important; }
  .pw-wrap{position:relative;}
  .pw-wrap input{padding-right:2.5rem!important;}
  .pw-eye{position:absolute;right:0.65rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray-400);display:flex;align-items:center;padding:0;line-height:1;}
  .pw-eye:hover{color:var(--gray-600);}
</style>
</head>
<body>
<div class="auth-box">
  <div class="auth-logo"><video src="{{ url_for('static', filename='img/logo.mp4') }}" autoplay loop muted playsinline></video></div>
  <div class="auth-sub">Sign in to place your order</div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ 'danger' if cat == 'error' else ('success' if cat == 'success' else 'info') }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{ url_for('login_phone') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="text" name="website" style="display:none;" tabindex="-1" autocomplete="off">
    <div class="form-group">
      <label class="form-label">Email address</label>
      <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus autocomplete="email" maxlength="254">
    </div>
    <div class="form-group" style="margin-top:1rem;">
      <label class="form-label">Password</label>
      <div class="pw-wrap">
        <input type="password" id="lp-pw" name="password" class="form-control" placeholder="Your password" required autocomplete="current-password" maxlength="128">
        <button type="button" class="pw-eye" onclick="togglePw('lp-pw',this)" aria-label="Show password" tabindex="-1">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-full" style="margin-top:1.25rem;">Sign In →</button>
  </form>

  <div style="display:flex;align-items:center;gap:0.75rem;margin:1.25rem 0;color:var(--gray-400);font-size:0.8rem;">
    <div style="flex:1;height:1px;background:var(--gray-200);"></div>or<div style="flex:1;height:1px;background:var(--gray-200);"></div>
  </div>

  <p style="text-align:center;font-size:0.875rem;color:var(--gray-500);">
    Don't have an account? <a href="{{ url_for('signup') }}" style="color:var(--navy);font-weight:700;">Sign Up</a>
  </p>
  <p style="text-align:center;margin-top:0.75rem;font-size:0.8125rem;">
    <a href="/" style="color:var(--gray-400);">← Back to Deleqate</a>
  </p>
</div>
<script>
function togglePw(id, btn) {
  var inp = document.getElementById(id);
  var showing = inp.type === 'text';
  inp.type = showing ? 'password' : 'text';
  btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
  btn.innerHTML = showing
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
}
</script>
<script src="{{ url_for('static', filename='js/mobile.js') }}" defer></script>
</body>
</html>
