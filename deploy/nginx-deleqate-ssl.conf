# ── Deleqate nginx config (HTTPS, two-origin) ─────────────────
# Frontend (React SPA)  →  https://deleqate.com
# Backend  (Django API) →  https://api.deleqate.com   (proxied to gunicorn)
#
# Two origins are REQUIRED: routes like /order, /about, /admin exist as both
# a React page AND a backend JSON endpoint, so they cannot share one host.
# Both blocks use the deleqate.com certificate (issue it with the api SAN:
#   sudo certbot --nginx -d deleqate.com -d www.deleqate.com -d api.deleqate.com )

# HTTP → HTTPS for all three names
server {
    listen 80;
    server_name deleqate.com www.deleqate.com api.deleqate.com;
    return 301 https://$host$request_uri;
}

# ── FRONTEND: deleqate.com — serves the React build ──
server {
    listen 443 ssl;
    server_name deleqate.com www.deleqate.com;

    ssl_certificate /etc/letsencrypt/live/deleqate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deleqate.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/ubuntu/deleqate/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;   # SPA fallback
    }
    location ~* \.(js|css|svg|png|jpg|jpeg|webp|woff2?)$ {
        expires 7d;
        access_log off;
    }
}

# ── BACKEND: api.deleqate.com — proxies EVERYTHING to gunicorn ──
server {
    listen 443 ssl;
    server_name api.deleqate.com;

    ssl_certificate /etc/letsencrypt/live/deleqate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deleqate.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;   # allow image/audio uploads

    location / {
        proxy_pass http://127.0.0.1:5051;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
