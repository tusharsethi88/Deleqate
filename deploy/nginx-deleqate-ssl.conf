# ── Deleqate nginx config (HTTPS) ──────────────────────────────
# Frontend (React SPA) and backend (Django API) on separate hostnames.

# 1a) FRONTEND HTTP → HTTPS redirect
server {
    listen 80;
    server_name deleqate.com www.deleqate.com;
    return 301 https://$host$request_uri;
}

# 1b) FRONTEND HTTPS — serves the built React bundle
server {
    listen 443 ssl;
    server_name deleqate.com www.deleqate.com;

    ssl_certificate /etc/letsencrypt/live/deleqate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deleqate.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/ubuntu/deleqate/frontend/dist;
    index index.html;

    # SPA fallback: every unknown path returns index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|svg|png|jpg|jpeg|webp|woff2?)$ {
        expires 7d;
        access_log off;
    }
}

# 2) BACKEND — proxies everything to gunicorn (Django on 127.0.0.1:5051)
server {
    listen 80;
    server_name api.deleqate.com;

    client_max_body_size 50M;   # allow image/audio uploads

    location / {
        proxy_pass http://127.0.0.1:5051;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
