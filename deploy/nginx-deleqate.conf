# ── Deleqate nginx config ──────────────────────────────────────
# Frontend (React SPA) and backend (Django API) MUST be on separate
# hostnames — they share route names like /order, /login, /admin.

# 1a) FRONTEND HTTP → redirect to HTTPS if certs exist, else serve directly
server {
    listen 80;
    server_name deleqate.com www.deleqate.com;

    # If SSL certs exist, redirect all HTTP to HTTPS
    # If not, serve the frontend directly on HTTP
    location / {
        # This block is replaced at deploy time if SSL is detected
        root /home/ubuntu/deleqate/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|svg|png|jpg|jpeg|webp|woff2?)$ {
        root /home/ubuntu/deleqate/frontend/dist;
        expires 7d;
        access_log off;
    }
}

# 2) BACKEND — proxies everything to gunicorn (Django on 127.0.0.1:5051)
server {
    listen 80;
    server_name api.deleqate.com;

    client_max_body_size 50M;   # allow image/audio uploads

    location / {
        proxy_pass http://127.0.0.1:5051;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
