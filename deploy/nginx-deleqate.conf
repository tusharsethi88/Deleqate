# ── Deleqate nginx config (HTTP, single-domain) ───────────────
# Everything on deleqate.com — no api.deleqate.com needed.
# Backend paths are proxied to Gunicorn; everything else serves the React SPA.

server {
    listen 80;
    server_name deleqate.com www.deleqate.com;

    client_max_body_size 250M;   # deliverables (MP4/ZIP) can be up to 200MB

    # ── Backend routes → proxy to Gunicorn (Django on 127.0.0.1:5051) ──
    location /api/ {
        proxy_pass http://127.0.0.1:5051;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Auth routes
    location /login          { proxy_pass http://127.0.0.1:5051; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
    location /logout         { proxy_pass http://127.0.0.1:5051; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
    location /signup         { proxy_pass http://127.0.0.1:5051; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
    location /verify-otp     { proxy_pass http://127.0.0.1:5051; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
    location /verify-signup-otp { proxy_pass http://127.0.0.1:5051; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
    location /forgot-password { proxy_pass http://127.0.0.1:5051; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
    location /reset-password-verify { proxy_pass http://127.0.0.1:5051; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
    location /reset-password-new { proxy_pass http://127.0.0.1:5051; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
    location /dq-control-7x9k { proxy_pass http://127.0.0.1:5051; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }

    # Order submission & payment
    location /submit-order   { proxy_pass http://127.0.0.1:5051; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
    location /payment/       { proxy_pass http://127.0.0.1:5051; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }

    # File serving
    location /uploads/       { proxy_pass http://127.0.0.1:5051; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
    location /deliverables/  { proxy_pass http://127.0.0.1:5051; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }

    # SEO files
    location = /robots.txt   { proxy_pass http://127.0.0.1:5051; proxy_set_header Host $host; }
    location = /sitemap.xml  { proxy_pass http://127.0.0.1:5051; proxy_set_header Host $host; }
    location /.well-known/security.txt { proxy_pass http://127.0.0.1:5051; proxy_set_header Host $host; }

    # ── Frontend — React SPA (everything else) ──
    location / {
        root /home/ubuntu/deleqate/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|svg|png|jpg|jpeg|webp|woff2?)$ {
        root /home/ubuntu/deleqate/frontend/dist;
        expires 7d;
        access_log off;
    }
}
