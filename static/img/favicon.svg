<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dff4ff"/>
      <stop offset="45%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#2b9fe0"/>
    </radialGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="7" fill="#1E2A39"/>
  <text x="14.5" y="23" text-anchor="middle" font-family="Syne, Inter, Arial, sans-serif"
        font-size="21" font-weight="800" fill="#F5F8FA">D</text>
  <circle cx="25" cy="8" r="3.1" fill="url(#spark)" filter="url(#glow)"/>
</svg>
